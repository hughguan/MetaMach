# MetaMach 0.4.0 — CI Pipeline
# Native PG, no Docker. Tests janus-daemon, herdr-janus, janush, and janus::tmux.
# Per the 0.4.0 architecture: One PG, Multi-DB, tmux for session tests, SQLite bundled.

name: MetaMach CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Native PG connection (Unix socket via /tmp)
  PGHOST: /tmp
  PGUSER: metamach_admin
  PGDATABASE: metamach_db

jobs:
  test:
    name: Test (Rust ${{ matrix.rust }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        rust: ["1.88"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: metamach_admin
          POSTGRES_DB: metamach_db
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tmux postgresql-client

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            janus/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('janus/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --manifest-path janus/Cargo.toml -- --check

      - name: Clippy (lint)
        run: cargo clippy --manifest-path janus/Cargo.toml --all-targets -- -D warnings

      - name: Build release
        run: cargo build --release --locked --manifest-path janus/Cargo.toml

      - name: Apply catalog migration
        # CI's postgres:16 service creates an empty metamach_db; apply the
        # catalog schema (blueprints + absurd_audit_log) that the PG-gated
        # onboard/offboard tests exercise. Locally `make db-init` does this.
        # Idempotent (CREATE TABLE/INDEX IF NOT EXISTS). The per-blueprint
        # 002/003 overlays are applied in-code by ensure_blueprint_db on onboard.
        run: psql "postgres://metamach_admin@localhost:5432/metamach_db" -v ON_ERROR_STOP=1 -f janus/migrations/001_catalog.sql

      - name: Run tests
        run: cargo test --workspace --manifest-path janus/Cargo.toml
        env:
          # PG service connection for integration tests
          DATABASE_URL: postgres://metamach_admin@localhost:5432/metamach_db
          # tmux available for janus::tmux tests
          TMUX_TMPDIR: /tmp

      - name: Run PG-gated tests (ignored)
        # The `#[ignore]`d integration tests (UTC-05-02/04/04b, UTC-03-01/03/05)
        # need the postgres:16 service + tmux. They pass in parallel on CI, so
        # this is a blocking gate (regressions fail the build). If SSH-credential
        # tests are added later, split them into a separate `continue-on-error`
        # step so an absent SSH key doesn't break this gate.
        run: cargo test --workspace --manifest-path janus/Cargo.toml -- --ignored
        env:
          DATABASE_URL: postgres://metamach_admin@localhost:5432/metamach_db
          TMUX_TMPDIR: /tmp
