# MetaMach 0.3.0 - Tether tmux init config (ARCH §6.1, Review-Spec Metric 2.1)
#
# Loaded by the isolated Tether tmux server:
#   tmux -L metamach-tether -f configs/tmux.conf
# This is a dedicated server, separate from the personal tmux of the Factory
# Director, so server-wide settings here never leak into user sessions.
#
# Physical Non-Destruction invariant (ARCH §6.1, Review-Spec Metric 2.1):
# every Tether-managed session must survive process exit (segfault, syntax
# error, SSH drop) so the terminal scene is 100% preserved for
# `janus tether attach`. Per Metric 2.1, remain-on-exit is set PER-SESSION
# (no -g global option flag) via a session-created hook below; janus::tether
# (Task 2.4) also sets it per-session as a belt-and-suspenders guard.

# Keep the pane alive after its process exits - the core durability invariant.
# Per Review-Spec Metric 2.1: set per-session via a session-created hook, NOT via
# a global `set -g remain-on-exit on` (which Metric 2.1 forbids). The hook runs
# `set remain-on-exit on` in each new session context, so the option is never
# server-wide. (The -g on set-hook registers the global hook table, which is
# distinct from a -g on the remain-on-exit option itself.)
set-hook -g session-created "set remain-on-exit on"

# Minimal, deterministic shell for agent panes. janush is injected as SHELL
# by Tether at pane-create time (overriding default-shell), so this is only the
# fallback for pre-dispatch panes.
set -g default-shell "/bin/sh"

# Fast input response - no escape-time delay for keyboard-driven TUI attach.
set -g escape-time 0

# Headless server: no status bar (attach is for troubleshooting, not daily use).
set -g status off

# Generous scrollback so `janus tether attach` can recover recent stdout for
# HITL context (the 16KB result_cache budget still applies at the DB layer).
set -g history-limit 50000

# Session IDs are meaningful (tether-janus-task-<uuid>); do not auto-rename.
set -g allow-rename on
set -g automatic-rename off
